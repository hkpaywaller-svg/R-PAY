<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Task Center</title>
    <style>
        body { background-color: #0A0F1E; color: white; font-family: sans-serif; margin: 0; padding-bottom: 80px; }
        .tabs { display: flex; gap: 20px; padding: 20px; font-weight: bold; background: #151d30; }
        .tab-btn { cursor: pointer; padding-bottom: 5px; border-bottom: 2px solid transparent; }
        .active-tab { border-bottom: 2px solid #ff416c; color: #ff416c; }
        .task-card { background: #151d30; margin: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2D3748; }
        .buy-btn { background: linear-gradient(135deg, #ff416c, #ff4b2b); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .nav { position: fixed; bottom: 0; width: 100%; background: #0A0F1E; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #2D3748; }
    </style>
</head>
<body>

    <!-- Tabs: INR और USDT -->
    <div class="tabs">
        <div class="tab-btn active-tab" onclick="showSection('INR')">INR</div>
        <div class="tab-btn" onclick="showSection('USDT')">USDT</div>
    </div>

    <!-- INR सेक्शन -->
    <div id="INR-section">
        <div id="taskList"></div>
    </div>

    <!-- USDT सेक्शन (जो आपने 11220.jpg में दिखाया था) -->
    <div id="USDT-section" style="display:none; padding: 20px;">
        <div style="text-align: center; background: #151d30; padding: 20px; border-radius: 15px;">
            <p>QR Code Placeholder</p>
            <div class="info">Wallet Address (TRC-20): <br><b>TDBuftovrajbsdMhXWEhuoPATqAHDcthbx</b></div>
        </div>
    </div>

    <!-- Navigation -->
    <div class="nav">
        <div onclick="location.href='dashboard.html'">🏠<br>Home</div>
        <div onclick="location.href='deposit.html'">💸<br>Deposit</div>
        <div onclick="location.href='upi.html'">🏦<br>Bank</div>
        <div onclick="location.href='team.html'">📊<br>Team</div>
        <div onclick="location.href='profile.html'">🎯<br>Profile</div>
    </div>

    <script>
        // Tab switching function
        function showSection(type) {
            document.getElementById('INR-section').style.display = (type === 'INR') ? 'block' : 'none';
            document.getElementById('USDT-section').style.display = (type === 'USDT') ? 'block' : 'none';
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.toggle('active-tab', t.innerText === type));
        }

        // 1000 से 1 लाख तक के टास्क जनरेट करने वाला लूप
        const taskList = document.getElementById('taskList');
        for (let i = 1; i <= 100; i++) { // Demo ke liye 100 tak rakha hai
            let amount = i * 1000;
            if (amount > 100000) break;
            taskList.innerHTML += `
                <div class="task-card">
                    <div><b>₹ ${amount} INR</b></div>
                    <button class="buy-btn" onclick="location.href='order-details.html'">BUY</button>
                </div>
            `;
        }
    </script>
</body>
</html>
