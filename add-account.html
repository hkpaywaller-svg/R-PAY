<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Account - R Pay</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f7f9fc; margin: 0; padding: 0; padding-bottom: 80px; color: #333; }
        .app-container { max-width: 450px; margin: 0 auto; background-color: #fff; min-height: 100vh; box-shadow: 0 0 10px rgba(0,0,0,0.05); position: relative; }
        
        /* टॉप हेडर स्टाइल */
        .header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #f1f3f5; background: #fff; position: sticky; top: 0; z-index: 10; }
        .header-title { font-size: 18px; font-weight: bold; color: #000; }
        .back-btn { font-size: 20px; color: #000; text-decoration: none; cursor: pointer; }

        /* टैब्स स्टाइल */
        .top-tabs { display: flex; padding: 10px 20px; gap: 25px; border-bottom: 1px solid #f1f3f5; background: #fff; }
        .tab-btn { font-size: 16px; font-weight: bold; color: #ccc; cursor: pointer; border: none; background: none; padding: 8px 0; position: relative; }
        .tab-btn.active { color: #000; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #000; border-radius: 2px; }

        /* फॉर्म कंटेंट */
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; }

        /* इनपुट बॉक्स स्टाइल */
        .input-group { margin-bottom: 18px; }
        .input-label { font-size: 13px; font-weight: bold; color: #666; margin-bottom: 8px; display: block; }
        .input-field { width: 100%; padding: 12px 15px; border: 1px solid #eef0f2; background-color: #f8f9fa; border-radius: 8px; font-size: 14px; font-weight: bold; color: #000; box-sizing: border-box; outline: none; transition: 0.2s; }
        .input-field:focus { border-color: #000; background-color: #fff; }
        select.input-field { appearance: none; -webkit-appearance: none; cursor: pointer; }

        /* वार्निंग नोट */
        .warning-card { background-color: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: bold; line-height: 1.5; margin-bottom: 20px; }

        /* सेव बटन */
        .save-btn { width: 100%; background: #000; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .save-btn:active { background: #333; }

        /* नया अपडेटेड बॉटम नेविगेशन बार */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 450px; background: #fff; border-top: 1px solid #eee; display: flex; justify-content: space-around; padding: 10px 0; box-sizing: border-box; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; text-decoration: none; color: #999; font-size: 11px; font-weight: bold; cursor: pointer; width: 20%; text-align: center; }
        .nav-item.active { color: #000; }
        .nav-icon { font-size: 20px; margin-bottom: 4px; display: flex; justify-content: center; align-items: center; height: 22px; }
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="header">
        <a href="dashboard.html" class="back-btn">❮</a>
        <div class="header-title">Add Account</div>
        <div style="width: 20px;"></div>
    </div>

    <div class="top-tabs">
        <button class="tab-btn active" onclick="switchTab('bank', this)">Bank Card</button>
        <button class="tab-btn" onclick="switchTab('upi', this)">UPI / VPA</button>
    </div>

    <div id="bank-section" class="tab-content active">
        <div class="warning-card">
            ⚠️ Warning: Please make sure the bank information is 100% correct. Once bound, it cannot be modified. Incorrect info will cause withdrawal failure!
        </div>
        
        <form onsubmit="saveBankDetails(event)">
            <div class="input-group">
                <label class="input-label">Real Name (As per Bank Account)</label>
                <input type="text" id="bankRealName" class="input-field" placeholder="Enter full name" required>
            </div>

            <div class="input-group">
                <label class="input-label">Select Bank Name</label>
                <select id="bankName" class="input-field" required>
                    <option value="" disabled selected>Choose your bank</option>
                    <option value="SBI">State Bank of India (SBI)</option>
                    <option value="HDFC">HDFC Bank</option>
                    <option value="ICICI">ICICI Bank</option>
                    <option value="PNB">Punjab National Bank (PNB)</option>
                    <option value="BOB">Bank of Baroda</option>
                    <option value="AXIS">Axis Bank</option>
                </select>
            </div>

            <div class="input-group">
                <label class="input-label">Bank Account Number</label>
                <input type="password" id="accNo" class="input-field" placeholder="Enter account number" required>
            </div>

            <div class="input-group">
                <label class="input-label">Confirm Account Number</label>
                <input type="text" id="confirmAccNo" class="input-field" placeholder="Re-enter account number" required>
            </div>

            <div class="input-group">
                <label class="input-label">IFSC Code</label>
                <input type="text" id="ifscCode" class="input-field" placeholder="e.g. SBIN0001234" style="text-transform: uppercase;" required>
            </div>

            <button type="submit" class="save-btn">Bind Bank Card</button>
        </form>
    </div>

    <div id="upi-section" class="tab-content">
        <div class="warning-card">
            ⚠️ Warning: Ensure your UPI ID is active and correctly linked to your phone number.
        </div>

        <form onsubmit="saveUPIDetails(event)">
            <div class="input-group">
                <label class="input-label">Real Name</label>
                <input type="text" id="upiRealName" class="input-field" placeholder="Enter your name" required>
            </div>

            <div class="input-group">
                <label class="input-label">UPI ID / VPA</label>
                <input type="text" id="upiId" class="input-field" placeholder="username@upi" required>
            </div>

            <div class="input-group">
                <label class="input-label">Phone Number (UPI Linked)</label>
                <input type="tel" id="phoneNo" class="input-field" placeholder="10 digit mobile number" pattern="[0-9]{10}" required>
            </div>

            <button type="submit" class="save-btn">Bind UPI ID</button>
        </form>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item">
            <div class="nav-icon">🏠</div><span>Home</span>
        </a>
        <a href="deposit.html" class="nav-item">
            <div class="nav-icon">💳</div><span>Deposit</span>
        </a>
        <a href="add-account.html" class="nav-item active">
            <div class="nav-icon">💼</div><span>UPI</span>
        </a>
        <a href="team.html" class="nav-item">
            <div class="nav-icon">📊</div><span>Team</span>
        </a>
        <a href="me.html" class="nav-item">
            <div class="nav-icon">👤</div><span>Me</span>
        </a>
    </div>

</div>

<script>
    function switchTab(tabName, element) {
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
        element.classList.add('active');
        document.getElementById(tabName + '-section').classList.add('active');
    }

    function saveBankDetails(event) {
        event.preventDefault();
        const accNo = document.getElementById('accNo').value;
        const confirmAccNo = document.getElementById('confirmAccNo').value;
        if (accNo !== confirmAccNo) { alert('Error: Account numbers do not match!'); return; }
        localStorage.setItem('savedBankName', document.getElementById('bankRealName').value);
        localStorage.setItem('savedBankChoice', document.getElementById('bankName').value);
        localStorage.setItem('savedAccNo', accNo);
        localStorage.setItem('savedIfsc', document.getElementById('ifscCode').value.toUpperCase());
        alert('Success: Bank Card linked securely!');
    }

    function saveUPIDetails(event) {
        event.preventDefault();
        localStorage.setItem('savedUpiName', document.getElementById('upiRealName').value);
        localStorage.setItem('savedUpiId', document.getElementById('upiId').value);
        localStorage.setItem('savedUpiPhone', document.getElementById('phoneNo').value);
        alert('Success: UPI ID linked securely!');
    }

    window.onload = function() {
        if(localStorage.getItem('savedBankName')) document.getElementById('bankRealName').value = localStorage.getItem('savedBankName');
        if(localStorage.getItem('savedBankChoice')) document.getElementById('bankName').value = localStorage.getItem('savedBankChoice');
        if(localStorage.getItem('savedAccNo')) { document.getElementById('accNo').value = localStorage.getItem('savedAccNo'); document.getElementById('confirmAccNo').value = localStorage.getItem('savedAccNo'); }
        if(localStorage.getItem('savedIfsc')) document.getElementById('ifscCode').value = localStorage.getItem('savedIfsc');
        if(localStorage.getItem('savedUpiName')) document.getElementById('upiRealName').value = localStorage.getItem('savedUpiName');
        if(localStorage.getItem('savedUpiId')) document.getElementById('upiId').value = localStorage.getItem('savedUpiId');
        if(localStorage.getItem('savedUpiPhone')) document.getElementById('phoneNo').value = localStorage.getItem('savedUpiPhone');
    }
</script>
</body>
</html>
