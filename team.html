<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Team Section</title>
    <style>
        body { background: #0A0F1E; color: white; font-family: sans-serif; padding: 15px; }
        .stats-card { background: #151d30; padding: 20px; border-radius: 15px; display: flex; justify-content: space-between; border: 1px solid #2D3748; margin-bottom: 20px; }
        .invite-box { background: #151d30; padding: 15px; border-radius: 10px; border: 1px solid #2D3748; margin-bottom: 20px; }
        .member-list { background: #151d30; padding: 15px; border-radius: 10px; border: 1px solid #2D3748; }
        .member-item { border-bottom: 1px solid #2D3748; padding: 10px 0; display: flex; justify-content: space-between; }
        button { background: #4F46E5; border: none; color: white; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Stats Section -->
    <div class="stats-card">
        <div><small>Commission</small><br><b>2811.68</b></div>
        <div><small>Team Recharge</small><br><b>1579047.85</b></div>
    </div>

    <!-- Referral Link Section -->
    <div class="invite-box">
        <label>Invite Code</label>
        <div style="margin-top: 10px; display: flex; justify-content: space-between;">
            <input type="text" id="myLink" value="...b.tatapay-web.com/regist?code=0dashowpay8j" readonly style="width: 70%; background: #0A0F1E; border: 1px solid #2D3748; color: white; padding: 5px;">
            <button onclick="copyLink()">Copy</button>
        </div>
    </div>

    <!-- Team Details Section -->
    <div class="member-list">
        <h3>Team Detail</h3>
        <div class="member-item">
            <span>Phone: 705****7069</span>
            <span>Comm: 0</span>
        </div>
        <div class="member-item">
            <span>Phone: 986****1214</span>
            <span>Comm: 0</span>
        </div>
        <div class="member-item">
            <span>Phone: 986****3447</span>
            <span>Comm: 29.68</span>
        </div>
    </div>

    <script>
        function copyLink() {
            const link = document.getElementById('myLink');
            link.select();
            document.execCommand('copy');
            alert("Link Copied!");
        }
    </script>
</body>
</html>
