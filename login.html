<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOG IN</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #ffffff; display: flex; justify-content: center; min-height: 100vh; color: #333; }
        .app-container { width: 100%; max-width: 450px; background: #ffffff; padding: 24px 20px; display: flex; flex-direction: column; position: relative; }
        
        .page-title { font-size: 18px; font-weight: bold; text-align: center; margin-top: 20px; margin-bottom: 60px; color: #111; letter-spacing: 0.5px; }
        
        .form-box { display: flex; flex-direction: column; gap: 20px; width: 100%; }
        .input-wrapper { position: relative; width: 100%; }
        
        .form-input { width: 100%; background-color: #f7f7f9; border: none; padding: 18px 16px 18px 50px; border-radius: 12px; font-size: 16px; color: #000; outline: none; }
        .form-input::placeholder { color: #b5b5be; font-weight: 500; }
        
        .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); width: 20px; height: 20px; opacity: 0.4; }

        .forget-password { text-align: right; margin-top: 4px; font-size: 14px; color: #3a86ff; font-weight: 500; cursor: pointer; text-decoration: none; display: block; }

        .submit-btn { width: 100%; background-color: #8e8e93; color: #ffffff; border: none; padding: 18px; font-size: 16px; font-weight: bold; border-radius: 12px; cursor: pointer; margin-top: 60px; text-align: center; text-transform: uppercase; }
        .submit-btn:active { opacity: 0.9; }

        .switch-link { text-align: center; margin-top: 24px; font-size: 14px; color: #8e8e93; }
        .switch-link a { color: #111; font-weight: bold; text-decoration: none; margin-left: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="page-title">LOG IN</div>

    <form id="login-form" class="form-box">
        <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
            <input type="tel" class="form-input" placeholder="Enter Your Phone Number" maxlength="10" required>
        </div>

        <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="password" class="form-input" placeholder="Enter Password" required>
            <a href="#" class="forget-password">Forget Password</a>
        </div>

        <button type="submit" class="submit-btn">LOG IN</button>
    </form>

    <div class="switch-link">
        Don't have an account?<a href="register.html">Register</a>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        alert("Login Successful!");
        // लॉगिन होने के बाद सीधे मुख्य मार्केट डैशबोर्ड पर भेजें
        window.location.href = "deposit.html";
    });
</script>
</body>
</html>
