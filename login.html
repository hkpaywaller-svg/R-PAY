<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SwiftPay</title>
    <style>
        body { margin: 0; background-color: #0A0F1E; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 90%; max-width: 400px; background: #151d30; padding: 30px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); text-align: center; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 20px; color: #4F46E5; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #2D3748; background: #0A0F1E; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; background: #4F46E5; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        a { color: #4F46E5; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">RN PAY</div>
        <h3>LOGIN</h3>
        <input type="text" placeholder="Mobile Number">
        <input type="password" placeholder="Password">
        <!-- यह बटन आपको dashboard.html पर ले जाएगा -->
        <button onclick="window.location.href='dashboard.html'">LOGIN</button>
        <a href="register.html">Register New Account</a>
    </div>
</body>
</html>
