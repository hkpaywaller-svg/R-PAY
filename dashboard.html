<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RN Pay Dashboard</title>
    <style>
        body { margin: 0; background-color: #0d1117; color: white; font-family: sans-serif; padding-bottom: 70px; }
        .header { padding: 15px; font-size: 20px; font-weight: bold; }
        
        /* बैनर सेक्शन */
        .banner { background: #1a2233; margin: 10px; border-radius: 15px; padding: 15px; text-align: center; border: 1px solid #30363d; }
        
        /* डेटा ग्रिड */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px; }
        .card { background: #1a2233; padding: 15px; border-radius: 12px; border: 1px solid #30363d; }
        .label { font-size: 11px; color: #8b949e; text-transform: uppercase; }
        .value { font-size: 16px; font-weight: bold; margin-top: 5px; }

        /* टॉप-अप बटन */
        .topup { background: linear-gradient(90deg, #1f2937, #374151); margin: 10px; padding: 15px; text-align: center; border-radius: 10px; font-weight: bold; border: 1px solid #4a5568; }

        /* ट्यूटोरियल */
        .tutorial-card { background: #1a2233; margin: 10px; padding: 10px; border-radius: 12px; display: flex; align-items: center; gap: 10px; }

        /* बॉटम नेविगेशन */
        .nav { position: fixed; bottom: 0; width: 100%; background: #0d1117; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #30363d; }
        .nav-item { text-align: center; font-size: 10px; color: #8b949e; }
    </style>
</head>
<body>

    <div class="header">SwiftPay Gaming</div>

    <div class="banner">
        <div style="font-weight: bold; font-size: 18px;">LUCKY SPIN WHEEL</div>
        <div style="font-size: 12px; color: #58a6ff;">WIN BIG CASH PRIZES!</div>
    </div>

    <div class="grid">
        <div class="card"><div class="label">Current Balance</div><div class="value">$1,250.00</div></div>
        <div class="card"><div class="label">Team Commission</div><div class="value">9135.63</div></div>
        <div class="card"><div class="label">Team Activity</div><div class="value">75 Active</div></div>
        <div class="card"><div class="label">Total Earnings</div><div class="value">12,450.00</div></div>
    </div>

    <div class="topup">TOP-UP</div>

    <div class="tutorial-card">
        <div style="width: 50px; height: 50px; background: #30363d; border-radius: 8px;"></div>
        <div>How to link to FreeCharge</div>
    </div>

    <div class="nav">
        <div class="nav-item">🏠<br>Home</div>
        <div class="nav-item">💸<br>Deposit</div>
        <div class="nav-item">🏦<br>Bank</div>
        <div class="nav-item">📊<br>Team</div>
        <div class="nav-item">🎯<br>Profile</div>
    </div>

</body>
</html>
